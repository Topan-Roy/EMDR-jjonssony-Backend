<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY-EMDR | Payment Diagnostic Tool</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-30%, -30%); }
            to { transform: translate(30%, 30%); }
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-weight: 600; margin-bottom: 0.5rem; font-size: 1.5rem; text-align: center; }
        p.subtitle { color: #94a3b8; font-size: 0.9rem; text-align: center; margin-bottom: 2rem; }

        .field { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; margin-bottom: 0.5rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }

        #card-element {
            padding: 14px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            display: none;
        }

        .success { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .error { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <h1>Payment Diagnostic</h1>
        <p class="subtitle">End-to-End Verification for Stripe Integration</p>

        <div class="field">
            <label>Stripe Publishable Key</label>
            <input type="text" id="pk" placeholder="pk_test_..." value="">
        </div>

        <div class="field">
            <label>Auth Token (JWT)</label>
            <input type="text" id="token" placeholder="Paste JWT here" value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OWU5MmM1ZDM1ZGVhOTI1NTczNTMzMmYiLCJyb2xlIjoidXNlciIsImlhdCI6MTc3Njg4OTY2MywiZXhwIjoxNzc2OTc2MDYzfQ.6jTJGDp6BwCDDpb_EN73KGxvo8uIIcFogkCGb4RQmvQ">
        </div>

        <div class="field">
            <label>Select Plan</label>
            <select id="plan-id">
                <option value="69e92c5d35dea92557353327">Test Premium Plan (£120)</option>
            </select>
        </div>

        <div class="field">
            <label>Card Details</label>
            <div id="card-element"></div>
        </div>

        <button id="pay-button" class="btn" onclick="handlePayment()">Pay Now</button>

        <div id="status"></div>
    </div>

    <script>
        let stripe;
        let elements;
        let card;

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.innerHTML = msg;
            el.className = type;
            el.style.display = 'block';
        }

        function initStripe() {
            const pk = document.getElementById('pk').value;
            if (!pk) return;
            
            stripe = Stripe(pk);
            elements = stripe.elements();
            card = elements.create('card', {
                style: {
                    base: {
                        color: '#ffffff',
                        fontFamily: 'Outfit, sans-serif',
                        fontSmoothing: 'antialiased',
                        fontSize: '16px',
                        '::placeholder': { color: '#94a3b8' }
                    },
                    invalid: { color: '#f87171', iconColor: '#f87171' }
                }
            });
            card.mount('#card-element');
        }

        document.getElementById('pk').addEventListener('input', initStripe);

        async function handlePayment() {
            const btn = document.getElementById('pay-button');
            const token = document.getElementById('token').value;
            const planId = document.getElementById('plan-id').value;
            const pk = document.getElementById('pk').value;

            if (!pk) {
                alert('Please enter your Stripe Publishable Key first!');
                return;
            }

            if (!stripe) initStripe();

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>Processing...';

            try {
                // 1. Create Payment Intent
                showStatus('Creating Payment Intent...', 'success');
                const response = await fetch('/api/payment/create-intent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ planId })
                });

                const { data, success, error } = await response.json();
                if (!success) throw new Error(error?.message || 'Failed to create intent');

                const clientSecret = data.clientSecret;

                // 2. Confirm Card Payment
                showStatus('Confirming card...', 'success');
                const result = await stripe.confirmCardPayment(clientSecret, {
                    payment_method: { card: card }
                });

                if (result.error) {
                    throw new Error(result.error.message);
                }

                if (result.paymentIntent.status === 'succeeded') {
                    // 3. Confirm with Backend
                    showStatus('Activating subscription...', 'success');
                    const confirmRes = await fetch('/api/payment/confirm', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ paymentIntentId: result.paymentIntent.id })
                    });

                    const confirmData = await confirmRes.json();
                    if (!confirmData.success) throw new Error('Backend confirmation failed');

                    showStatus('🎉 Payment Success! Subscription Activated.', 'success');
                }
            } catch (err) {
                showStatus('❌ Error: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Pay Now';
            }
        }
    </script>
</body>
</html>
